services:
  - type: web
    name: threadcast
    runtime: node
    region: oregon
    buildCommand: >
      pnpm install &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/threadcast run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
